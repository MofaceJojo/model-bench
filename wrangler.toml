name = "model-bench"
main = "worker.js"
compatibility_date = "2024-09-23"

# Serve the static app from ./public and let worker.js handle /proxy
[assets]
directory = "public"
binding = "ASSETS"

# Optional: bind to your own Cloudflare domain
# routes = [
#   { pattern = "bench.yourdomain.com", custom_domain = true }
# ]

# 定时跑分：每 6 小时一次
[triggers]
crons = ["0 */6 * * *"]

# 跑分结果存储。部署前运行：
#   wrangler kv namespace create BENCH_KV
# 然后把输出的 id 填到下面
[[kv_namespaces]]
binding = "BENCH_KV"
id = "44aeb042d27a4c69817c828afdb0ee88"
