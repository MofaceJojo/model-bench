<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>免费大模型速度排行榜 · Model Bench</title>
<style>
  :root { color-scheme: dark; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
         background: #0f1117; color: #e2e5ec; padding: 24px 16px 60px; }
  .wrap { max-width: 960px; margin: 0 auto; }
  h1 { font-size: 22px; margin-bottom: 4px; }
  .sub { color: #8b93a5; font-size: 13px; margin-bottom: 20px; }
  .sub a { color: #10b981; text-decoration: none; }
  .updated { font-size: 12px; color: #8b93a5; margin-bottom: 12px; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { padding: 9px 10px; text-align: left; border-bottom: 1px solid #232735; }
  th { color: #8b93a5; font-weight: 500; font-size: 12px; cursor: pointer;
       user-select: none; white-space: nowrap; }
  th:hover { color: #e2e5ec; }
  th .arrow { opacity: .6; }
  td.num { font-variant-numeric: tabular-nums; }
  .rank { color: #8b93a5; width: 34px; }
  .prov { display: inline-block; font-size: 12px; color: #8b93a5; }
  .model { word-break: break-all; }
  .fast { color: #10b981; }
  .err { color: #ef4444; font-size: 12px; }
  .tbl-scroll { overflow-x: auto; }
  h2 { font-size: 16px; margin: 36px 0 10px; }
  .quota-list { font-size: 13px; line-height: 1.9; color: #b8bfce; }
  .quota-list b { color: #e2e5ec; }
  .empty { padding: 40px 0; text-align: center; color: #8b93a5; }
</style>
</head>
<body>
<div class="wrap">
  <h1>免费大模型速度排行榜</h1>
  <div class="sub">自动定时实测各家免费 API 的首字延迟与生成速度 ·
    <a href="tool.html">用自己的 Key 手动测 →</a></div>
  <div class="updated" id="updated">加载中…</div>
  <div class="tbl-scroll">
    <table>
      <thead><tr>
        <th class="rank">#</th>
        <th data-k="providerName">厂商 <span class="arrow"></span></th>
        <th data-k="model">模型 <span class="arrow"></span></th>
        <th data-k="ttft">首字延迟 <span class="arrow">▲</span></th>
        <th data-k="tps">生成速度 <span class="arrow"></span></th>
      </tr></thead>
      <tbody id="tbody"><tr><td colspan="5" class="empty">加载中…</td></tr></tbody>
    </table>
  </div>
  <h2>各家免费额度一览</h2>
  <div class="quota-list" id="quota"></div>
</div>
<script>
let rows = [], sortKey = "ttft", sortAsc = true;

function render() {
  const ok = rows.filter(r => r.ok).sort((a, b) => {
    const va = a[sortKey], vb = b[sortKey];
    const cmp = typeof va === "string" ? String(va).localeCompare(String(vb)) : va - vb;
    return sortAsc ? cmp : -cmp;
  });
  const bad = rows.filter(r => !r.ok);
  const tbody = document.getElementById("tbody");
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="empty">暂无数据 — 第一轮跑分完成后这里会出现榜单</td></tr>';
    return;
  }
  const minTtft = Math.min(...ok.map(r => r.ttft));
  const maxTps = Math.max(...ok.map(r => r.tps));
  tbody.innerHTML = ok.map((r, i) => `<tr>
      <td class="rank">${i + 1}</td>
      <td><span class="prov">${r.providerName}</span></td>
      <td class="model">${r.model}</td>
      <td class="num ${r.ttft === minTtft ? "fast" : ""}">${r.ttft} ms</td>
      <td class="num ${r.tps === maxTps ? "fast" : ""}">${r.tps} tok/s</td>
    </tr>`).join("") +
    bad.map(r => `<tr>
      <td class="rank">–</td>
      <td><span class="prov">${r.providerName}</span></td>
      <td class="model">${r.model}</td>
      <td colspan="2" class="err">${r.error || "失败"}</td>
    </tr>`).join("");
  document.querySelectorAll("th[data-k]").forEach(th => {
    th.querySelector(".arrow").textContent =
      th.dataset.k === sortKey ? (sortAsc ? "▲" : "▼") : "";
  });
}

document.querySelectorAll("th[data-k]").forEach(th => th.onclick = () => {
  const k = th.dataset.k;
  if (k === sortKey) sortAsc = !sortAsc;
  else { sortKey = k; sortAsc = k !== "tps"; }  // 速度默认降序
  render();
});

fetch("/api/results").then(r => r.json()).then(doc => {
  rows = doc.results || [];
  document.getElementById("updated").textContent = doc.updatedAt
    ? "上次跑分：" + new Date(doc.updatedAt).toLocaleString("zh-CN")
    : "还没有跑分数据（等第一次定时任务，或用 /api/run 手动触发）";
  const quotas = {};
  rows.forEach(r => { if (r.quota) quotas[r.providerName] = r.quota; });
  document.getElementById("quota").innerHTML = Object.entries(quotas)
    .map(([n, q]) => `<div><b>${n}</b> — ${q}</div>`).join("")
    || "暂无数据";
  render();
}).catch(() => {
  document.getElementById("updated").textContent =
    "读取失败 — 本地直接打开文件看不到数据，请用 wrangler dev 或部署后访问";
});
</script>
</body>
</html>
